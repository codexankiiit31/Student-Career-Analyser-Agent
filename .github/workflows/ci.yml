name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Validate
  # Runs on every push and every pull request
  # ─────────────────────────────────────────────
  test:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies only
        run: |
          pip install --upgrade pip
          # Install only the non-ML packages for a fast validation check
          pip install fastapi uvicorn python-dotenv pydantic

      - name: Check Python syntax (all .py files)
        run: |
          find backend -name "*.py" \
            -not -path "*/__pycache__/*" \
            -not -path "*/.careervnv/*" \
            -exec python -m py_compile {} \;
          echo "✅ All Python files are syntactically valid!"

      - name: Check requirements.txt is valid
        run: |
          test -s backend/requirements.txt && echo "✅ requirements.txt exists and is not empty!"

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Images
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aicareeragent-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aicareeragent-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
